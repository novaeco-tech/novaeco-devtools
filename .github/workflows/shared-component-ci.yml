name: NovaEco Shared Component CI

on:
  workflow_call:
    secrets:
      AUTOMATION_APP_ID:
        required: true
      AUTOMATION_APP_PRIVATE_KEY:
        required: true

# GLOBAL PERMISSIONS
permissions:
  contents: read # Required to clone code
  packages: read # Required to pull private container images

jobs:
  # Job 1: Detect changes & Repository Shape
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      # File Changes
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      integration: ${{ steps.filter.outputs.integration }}
      e2e: ${{ steps.filter.outputs.e2e }}
      performance: ${{ steps.filter.outputs.performance }}
      # Repo Shape (Directory Existence)
      has_docs: ${{ steps.check_dirs.outputs.has_docs }}
      has_integration: ${{ steps.check_dirs.outputs.has_integration }}
      has_e2e: ${{ steps.check_dirs.outputs.has_e2e }}
      has_perf: ${{ steps.check_dirs.outputs.has_perf }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'api/**'
              - 'client/**'
              - 'core/**'
              - 'domain/**'
              - 'service/**'
              - 'deploy/**'
              - 'pyproject.toml'
            docs: ['docs/**']
            integration:
              - 'api/**'
              - 'client/**'
              - 'core/**'
              - 'domain/**'
              - 'service/**'
              - 'deploy/**'
              - 'tests/integration/**'
              - '.devcontainer/docker-compose.yml'
            e2e:
              - 'api/**'
              - 'client/**'
              - 'core/**'
              - 'domain/**'
              - 'service/**'
              - 'deploy/**'
              - 'tests/e2e/**'
              - '.devcontainer/docker-compose.yml'
            performance:
              - 'api/**'
              - 'client/**'
              - 'core/**'
              - 'domain/**'
              - 'service/**'
              - 'deploy/**'
              - 'tests/performance/**'

      - name: Check Repository Shape
        id: check_dirs
        run: |
          # Check if specific layers exist in this repository
          echo "has_docs=$([ -d 'docs/source' ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_integration=$([ -d 'tests/integration' ] && [ -f '.devcontainer/docker-compose.yml' ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_e2e=$([ -d 'tests/e2e' ] && [ -f '.devcontainer/docker-compose.yml' ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_perf=$([ -d 'tests/performance' ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  # Job 2: Unified L5 Unit Tests & Build
  test-unit:
    needs: changed-files
    if: ${{ needs.changed-files.outputs.code == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/novaeco-tech/novaeco-dev-unified:v0.1.0
      options: --user root
      credentials:
        username: github-actions[bot]
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Unified Setup NovaEco Env
        id: setup
        uses: novaeco-tech/novaeco-devtools/.github/actions/setup-novaeco@v0.1.0
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Sync Upstream Dependencies
        env:
          GITHUB_TOKEN: ${{ steps.setup.outputs.token }}
        run: novaeco deps sync

      - name: Build Local Fractal Layers
        run: |
          echo "🔨 Building Fractal Layers..."
          novaeco build all
          
          # Conditionally install wheels if the build produced any
          if ls dist/*.whl 1> /dev/null 2>&1; then
            pip install dist/*.whl --force-reinstall --no-deps
          fi
          
          # Resolve and install external public dependencies
          if [ -f pyproject.toml ]; then
            pip install ".[dev]"
          fi

      - name: Run L5 Unit Tests (C++ & Python)
        run: |
          echo "🧪 Running L5 Unit Tests..."
          novaeco test unit

  # Job 3: Documentation Tests
  test-docs:
    needs: changed-files
    # Using the boolean output from Job 1 instead of hashFiles
    if: ${{ (needs.changed-files.outputs.docs == 'true' || github.event_name == 'workflow_dispatch') && needs.changed-files.outputs.has_docs == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/novaeco-tech/novaeco-dev-unified:v0.1.0
      options: --user root
      credentials:
        username: github-actions[bot]
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Placeholders
        run: |
          mkdir -p docs/source/reports/_generated
          touch docs/source/reports/_generated/security_vulns.rst
          touch benchmark_results.txt
          touch coverage_summary.txt

      - name: Build Check (Strict)
        run: sphinx-build -W --keep-going -b html docs/source docs/build/html

      - name: Link Check
        run: sphinx-build -W --keep-going -b linkcheck docs/source docs/build/linkcheck

      - name: Run Doctests
        run: sphinx-build -W --keep-going -b doctest docs/source docs/build/doctest

  # Job 4: Integration Tests (L4)
  test-integration:
    needs: changed-files
    # Using the boolean output from Job 1 instead of hashFiles
    if: ${{ (needs.changed-files.outputs.integration == 'true' || github.event_name == 'workflow_dispatch') && needs.changed-files.outputs.has_integration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unified Setup NovaEco Env
        id: setup
        uses: novaeco-tech/novaeco-devtools/.github/actions/setup-novaeco@v0.1.0
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          install-python: 'true'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: github-actions[bot]
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Environment
        env:
          DOCS_USER: root
          SERVICE_USER: root
          GITHUB_TOKEN: ${{ steps.setup.outputs.token }}
        run: docker compose -f .devcontainer/docker-compose.yml up -d --wait
      
      - name: Dump Container Logs on Failure
        if: failure()
        run: docker compose -f .devcontainer/docker-compose.yml logs

      - name: Run L4 Integration & Contract Tests
        run: |
          echo "📜 Running L4 Contract & Integration Tests..."
          SERVICE_NAME=$(docker compose -f .devcontainer/docker-compose.yml config --services | grep '\-service$' | head -n 1)
          docker compose -f .devcontainer/docker-compose.yml exec -T $SERVICE_NAME novaeco test integration
          docker compose -f .devcontainer/docker-compose.yml exec -T $SERVICE_NAME novaeco test contract

  # Job 5: Component E2E (L3)
  test-e2e:
    needs: changed-files
    # Using the boolean output from Job 1 instead of hashFiles
    if: ${{ (needs.changed-files.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch') && needs.changed-files.outputs.has_e2e == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unified Setup NovaEco Env
        id: setup
        uses: novaeco-tech/novaeco-devtools/.github/actions/setup-novaeco@v0.1.0
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          install-python: 'true'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: github-actions[bot]
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Environment
        env:
          DOCS_USER: root
          SERVICE_USER: root
          GITHUB_TOKEN: ${{ steps.setup.outputs.token }}
        run: docker compose -f .devcontainer/docker-compose.yml up -d --wait
      
      - name: Dump Container Logs on Failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ steps.setup.outputs.token }}
        run: |
          SERVICE_NAME=$(docker compose -f .devcontainer/docker-compose.yml config --services | grep '\-service$' | head -n 1)
          docker compose -f .devcontainer/docker-compose.yml logs $SERVICE_NAME

      - name: Run L3 Component E2E
        run: |
          echo "🖥️ Running L3 E2E Tests against Live Container..."
          pytest tests/e2e
        env:
          novaeco_GATEWAY_TARGET: http://localhost:8000

  # Job 6: Performance (L5 Micro-Benchmarks)
  test-performance:
    needs: changed-files
    # Using the boolean output from Job 1 instead of hashFiles
    if: ${{ (needs.changed-files.outputs.performance == 'true' || github.event_name == 'workflow_dispatch') && needs.changed-files.outputs.has_perf == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/novaeco-tech/novaeco-dev-unified:v0.1.0
      options: --user root
      credentials:
        username: github-actions[bot]
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Unified Setup NovaEco Env
        id: setup
        uses: novaeco-tech/novaeco-devtools/.github/actions/setup-novaeco@v0.1.0
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Sync Upstream Dependencies
        env:
          GITHUB_TOKEN: ${{ steps.setup.outputs.token }}
        run: novaeco deps sync

      - name: Build Local Fractal Layers
        run: |
          novaeco build all
          if ls dist/*.whl 1> /dev/null 2>&1; then
            pip install dist/*.whl --force-reinstall --no-deps
          fi

      - name: Run L5 Micro-benchmarks
        run: |
          echo "📊 Running L5 Micro-benchmarks..."
          novaeco test performance